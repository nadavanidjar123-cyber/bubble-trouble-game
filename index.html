<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #fff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 300, y: 350, w: 50, h: 20 };
        let bubble = { x: 100, y: 100, r: 20, dx: 2, dy: 2 };

        function draw() {
            // ניקוי מסך
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ציור שחקן
            ctx.fillStyle = 'red';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // ציור בועה
            ctx.fillStyle = 'cyan';
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
            ctx.fill();

            // הזזת בועה
            bubble.x += bubble.dx;
            bubble.y += bubble.dy;

            // קירות
            if (bubble.x + bubble.r > canvas.width || bubble.x - bubble.r < 0) bubble.dx *= -1;
            if (bubble.y + bubble.r > canvas.height || bubble.y - bubble.r < 0) bubble.dy *= -1;

            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && player.x > 0) player.x -= 20;
            if (e.key === 'ArrowRight' && player.x < canvas.width - player.w) player.x += 20;
        });

        draw();
    </script>
</body>
</html>
