<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Trouble Deluxe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a1f;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: #fff;
    user-select: none;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    background: #000;
    box-shadow: 0 0 60px rgba(100,180,255,0.4);
    border-radius: 8px;
    max-width: 100%; max-height: 100%;
  }
  #hint {
    position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #88a; opacity: 0.7;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="600"></canvas>
</div>
<div id="hint">← → לתזוזה · רווח לירייה · P להשהיה</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // -------- Input --------
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowLeft','ArrowRight','Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
    if (e.code === 'KeyP') paused = !paused;
    if (e.code === 'Enter') {
      if (state === 'menu') startGame();
      else if (state === 'gameover' || state === 'win') { resetAll(); state = 'menu'; }
      else if (state === 'levelclear') nextLevel();
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // -------- Game state --------
  let state = 'menu';
  let paused = false;
  let level = 1;
  let score = 0;
  let lives = 3;
  let levelTimer = 0;
  let maxLevelTime = 60;
  let levelClearTimer = 0;
  let shakeAmt = 0;

  const MAX_LEVEL = 60;
  const CEILING_Y = 60;
  const SPIKE_H = 14;
  const SPIKE_W = 22;

  const player = {
    x: W/2, y: H - 40,
    w: 38, h: 50,
    speed: 320,
    cooldown: 0,
    invuln: 0,
    walkPhase: 0,
  };

  let bubbles = [];
  let harpoons = [];
  let particles = [];
  let powerups = [];
  let stars = [];
  let clouds = [];

  function initBackground() {
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H*0.7,
        r: Math.random()*1.5 + 0.3,
        tw: Math.random()*Math.PI*2,
        speed: Math.random()*0.5 + 0.2
      });
    }
    clouds = [];
    for (let i = 0; i < 4; i++) {
      clouds.push({
        x: Math.random()*W,
        y: 50 + Math.random()*150,
        w: 100 + Math.random()*120,
        speed: 8 + Math.random()*12,
        alpha: 0.08 + Math.random()*0.1
      });
    }
  }
  initBackground();

  const LEVEL_COLORS = [
    ['#ff5577','#ff99aa'],
    ['#55aaff','#99ccff'],
    ['#ffcc44','#ffe699'],
    ['#66ee99','#aaffcc'],
    ['#cc77ff','#e0aaff'],
    ['#ff8844','#ffbb88'],
    ['#44ddee','#99eeff'],
    ['#ee44cc','#ff99dd'],
    ['#ffee55','#fff7aa'],
    ['#ff3322','#ff8866']
  ];

  // Hand-designed first 10 levels, then procedural with ramping difficulty
  const LEVEL_DESIGNS = {
    1:  [[0.30, 150, 3,  80]],
    2:  [[0.25, 150, 3, 100], [0.75, 200, 2, -90]],
    3:  [[0.20, 150, 4,  70]],
    4:  [[0.30, 150, 3, 110], [0.70, 250, 3, -110]],
    5:  [[0.15,100,2,120],[0.35,200,2,-120],[0.55,100,2,120],[0.75,200,2,-120]],
    6:  [[0.50, 150, 4,  90], [0.20, 250, 2, -130]],
    7:  [[0.30, 150, 4, 100], [0.70, 200, 3, -120]],
    8:  [[0.20,150,3,130],[0.50,150,3,-130],[0.80,150,3,130]],
    9:  [[0.50, 100, 4, 140], [0.20, 300, 2, -160], [0.80, 300, 2, 160]],
    10: [[0.25, 100, 4, 130], [0.75, 100, 4, -130]],
  };

  function makeLevel(n) {
    bubbles = [];
    harpoons = [];
    particles = [];
    powerups = [];
    const palette = LEVEL_COLORS[(n-1) % LEVEL_COLORS.length];
    levelTimer = 0;
    maxLevelTime = 50 + Math.min(n, 30) * 5;

    if (LEVEL_DESIGNS[n]) {
      for (const [fx, y, size, vx] of LEVEL_DESIGNS[n]) {
        spawnBubble(W * fx, y, size, vx, palette);
      }
      return;
    }

    // Procedural for levels 11+
    // Difficulty ramps: more bubbles, larger, faster, more huge ones
    const tier = Math.floor((n - 11) / 10); // 0..4
    const speedMul = 1 + tier * 0.18 + ((n - 11) % 10) * 0.02;
    const rng = mulberry32(n * 9301 + 49297);

    // Choose composition based on level number
    const patterns = [
      // big chain
      () => {
        const count = 1 + Math.min(3, Math.floor(n / 18));
        for (let i = 0; i < count; i++) {
          const fx = 0.2 + (i / Math.max(1, count - 1)) * 0.6;
          spawnBubble(W*fx, 120 + i*40, 4, (i%2?1:-1) * (90 + tier*20) * speedMul, palette);
        }
      },
      // medium swarm
      () => {
        const count = 3 + Math.min(5, Math.floor(n / 8));
        for (let i = 0; i < count; i++) {
          spawnBubble(120 + i * (W-240)/(count-1), 100 + (i%2)*120, 3,
                     (i%2?1:-1) * (100 + tier*25) * speedMul, palette);
        }
      },
      // small army
      () => {
        const count = 6 + Math.min(6, Math.floor(n / 6));
        for (let i = 0; i < count; i++) {
          spawnBubble(80 + i * (W-160)/(count-1), 100 + (i%3)*80, 2,
                     (i%2?1:-1) * (130 + tier*20) * speedMul, palette);
        }
      },
      // mixed assault
      () => {
        spawnBubble(W*0.5, 100, 4, 100 * speedMul, palette);
        spawnBubble(W*0.2, 250, 3, -130 * speedMul, palette);
        spawnBubble(W*0.8, 250, 3, 130 * speedMul, palette);
        if (n >= 20) spawnBubble(W*0.5, 350, 2, 150 * speedMul, palette);
      },
      // pyramid
      () => {
        spawnBubble(W*0.5, 80, 4, 90 * speedMul, palette);
        spawnBubble(W*0.3, 200, 3, -110 * speedMul, palette);
        spawnBubble(W*0.7, 200, 3, 110 * speedMul, palette);
        if (n >= 25) {
          spawnBubble(W*0.2, 320, 2, -140 * speedMul, palette);
          spawnBubble(W*0.8, 320, 2, 140 * speedMul, palette);
        }
      },
      // crossfire
      () => {
        const rows = Math.min(3, 1 + Math.floor(n / 20));
        for (let r = 0; r < rows; r++) {
          spawnBubble(50, 120 + r*100, 3, (120 + tier*20) * speedMul, palette);
          spawnBubble(W-50, 120 + r*100, 3, -(120 + tier*20) * speedMul, palette);
        }
      },
      // huge boss
      () => {
        spawnBubble(W*0.3, 100, 4, 80 * speedMul, palette);
        spawnBubble(W*0.7, 100, 4, -80 * speedMul, palette);
        if (n >= 30) spawnBubble(W*0.5, 250, 3, 150 * speedMul, palette);
      },
    ];

    let pIdx = Math.floor(rng() * patterns.length);
    // Boss every 10 levels: force "huge boss" pattern
    if (n % 10 === 0) pIdx = patterns.length - 1;
    patterns[pIdx]();
  }

  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  function bubbleRadius(size) {
    return [0, 16, 28, 44, 64][size];
  }

  function bubbleScore(size) {
    return [0, 50, 30, 20, 10][size];
  }

  function spawnBubble(x, y, size, vx, palette) {
    const r = bubbleRadius(size);
    const minY = CEILING_Y + SPIKE_H + r + 8;
    if (y < minY) y = minY;
    bubbles.push({
      x, y,
      r,
      vx: vx,
      vy: 0,
      size,
      color1: palette[0],
      color2: palette[1],
      wobble: Math.random()*Math.PI*2,
      rot: 0
    });
  }

  function splitBubble(b) {
    score += bubbleScore(b.size);
    for (let i = 0; i < 18; i++) {
      const ang = Math.random()*Math.PI*2;
      const sp = 60 + Math.random()*180;
      particles.push({
        x: b.x, y: b.y,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
        life: 0.6 + Math.random()*0.4,
        max: 1, r: 2 + Math.random()*4,
        color: b.color2
      });
    }
    if (Math.random() < 0.18) {
      const types = ['life','slow','double','shield','triple','freeze','bomb','magnet'];
      powerups.push({
        x: b.x, y: b.y, vy: 60,
        type: types[Math.floor(Math.random()*types.length)],
        bob: 0,
        onFloor: false,
        floorTimer: 0,
        spawnAge: 0
      });
    }
    if (b.size > 1) {
      const ns = b.size - 1;
      const pal = [b.color1, b.color2];
      const bounceUp = -260;
      bubbles.push({
        x: b.x, y: b.y, r: bubbleRadius(ns),
        vx: -Math.abs(b.vx || 100) * 0.9 - 30,
        vy: bounceUp,
        size: ns, color1: pal[0], color2: pal[1],
        wobble: Math.random()*Math.PI*2, rot: 0
      });
      bubbles.push({
        x: b.x, y: b.y, r: bubbleRadius(ns),
        vx: Math.abs(b.vx || 100) * 0.9 + 30,
        vy: bounceUp,
        size: ns, color1: pal[0], color2: pal[1],
        wobble: Math.random()*Math.PI*2, rot: 0
      });
    }
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    if (!paused && (state === 'playing' || state === 'levelclear')) update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    for (const s of stars) {
      s.tw += dt * 3;
      s.x -= s.speed * dt * 4;
      if (s.x < 0) s.x = W;
    }
    for (const c of clouds) {
      c.x -= c.speed * dt;
      if (c.x < -c.w) c.x = W + c.w;
    }

    if (state === 'levelclear') {
      levelClearTimer -= dt;
      updateParticles(dt);
      return;
    }

    levelTimer += dt;
    if (levelTimer > maxLevelTime) {
      damagePlayer();
      levelTimer = 0;
    }

    if (player.invuln > 0) player.invuln -= dt;
    let move = 0;
    if (keys['ArrowLeft']) move -= 1;
    if (keys['ArrowRight']) move += 1;
    player.x += move * player.speed * dt;
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    if (move !== 0) player.walkPhase += dt * 10;

    player.cooldown -= dt;
    const maxHarpoons = hasTriple ? 3 : (hasDouble ? 2 : 1);
    if (keys['Space'] && player.cooldown <= 0 && harpoons.length < maxHarpoons) {
      harpoons.push({
        x: player.x,
        topY: player.y - 10,
        speed: 700
      });
      player.cooldown = 0.15;
    }

    for (const h of harpoons) {
      h.topY -= h.speed * dt;
    }
    harpoons = harpoons.filter(h => h.topY > 10);

    const gravity = 380;
    const isFrozen = freezeTimer > 0;
    const slowFactor = isFrozen ? 0 : (slowTimer > 0 ? 0.5 : 1);
    if (slowTimer > 0) slowTimer -= dt;
    if (freezeTimer > 0) freezeTimer -= dt;
    if (doubleTimer > 0) {
      doubleTimer -= dt;
      if (doubleTimer <= 0) hasDouble = false;
    }
    if (tripleTimer > 0) {
      tripleTimer -= dt;
      if (tripleTimer <= 0) hasTriple = false;
    }
    if (magnetTimer > 0) magnetTimer -= dt;

    // Bubbles physics + spike collisions
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.wobble += dt * 3;
      b.x += b.vx * dt * slowFactor;
      b.y += b.vy * dt * slowFactor;
      b.vy += gravity * dt * slowFactor;
      if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); }
      if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }
      if (b.y + b.r > H - 20) {
        b.y = H - 20 - b.r;
        const bh = [0, 320, 380, 440, 500][b.size];
        b.vy = -bh;
      }
      // Ceiling spikes — pop the bubble if it reaches them
      if (b.y - b.r < CEILING_Y + SPIKE_H) {
        bubbles.splice(i, 1);
        splitBubble(b);
        shakeAmt = Math.max(shakeAmt, 6);
        continue;
      }
    }

    for (let i = harpoons.length - 1; i >= 0; i--) {
      const h = harpoons[i];
      for (let j = bubbles.length - 1; j >= 0; j--) {
        const b = bubbles[j];
        const lineX = h.x;
        const dx = Math.abs(b.x - lineX);
        if (dx < b.r) {
          const lineTop = h.topY;
          const lineBot = player.y - 10;
          if (b.y + b.r >= lineTop && b.y - b.r <= lineBot) {
            bubbles.splice(j, 1);
            splitBubble(b);
            harpoons.splice(i, 1);
            shakeAmt = 8;
            break;
          }
        }
      }
    }

    if (player.invuln <= 0) {
      for (const b of bubbles) {
        const dx = b.x - player.x;
        const dy = b.y - (player.y + player.h/4);
        if (dx*dx + dy*dy < (b.r + 14)*(b.r + 14)) {
          damagePlayer();
          break;
        }
      }
    }

    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.spawnAge += dt;
      p.bob += dt * 4;
      if (!p.onFloor) {
        p.y += p.vy * dt;
        if (p.y >= H - 32) {
          p.y = H - 32;
          p.onFloor = true;
          p.floorTimer = 5;
        }
      } else {
        p.floorTimer -= dt;
        if (p.floorTimer <= 0) { powerups.splice(i,1); continue; }
      }
      // Magnet effect: pull powerups toward player
      if (magnetTimer > 0) {
        const dx = player.x - p.x;
        const dy = player.y - p.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          const pull = 260 * dt;
          p.x += (dx/d) * pull;
          if (!p.onFloor) p.y += (dy/d) * pull;
        }
      }
      const dx = p.x - player.x;
      const dy = p.y - player.y;
      if (dx*dx + dy*dy < 32*32) {
        applyPowerup(p.type);
        powerups.splice(i,1);
      }
    }

    updateParticles(dt);

    if (shakeAmt > 0) shakeAmt = Math.max(0, shakeAmt - dt * 30);

    if (bubbles.length === 0) {
      state = 'levelclear';
      levelClearTimer = 2.2;
      score += Math.floor((maxLevelTime - levelTimer) * 10);
      score += lives * 50;
    }
  }

  let slowTimer = 0;
  let hasDouble = false;
  let doubleTimer = 0;
  let hasTriple = false;
  let tripleTimer = 0;
  let freezeTimer = 0;
  let magnetTimer = 0;
  let shieldCharges = 0;

  function applyPowerup(type) {
    if (type === 'life') lives = Math.min(lives + 1, 5);
    if (type === 'slow') slowTimer = 6;
    if (type === 'double') { hasDouble = true; doubleTimer = 8; }
    if (type === 'triple') { hasTriple = true; tripleTimer = 6; }
    if (type === 'freeze') freezeTimer = 3;
    if (type === 'shield') shieldCharges = Math.min(shieldCharges + 1, 3);
    if (type === 'magnet') magnetTimer = 7;
    if (type === 'bomb') {
      // Pop ALL smallest bubbles instantly
      for (let i = bubbles.length - 1; i >= 0; i--) {
        if (bubbles[i].size === 1) {
          const b = bubbles[i];
          bubbles.splice(i, 1);
          splitBubble(b);
        }
      }
      shakeAmt = 14;
    }
    for (let i = 0; i < 22; i++) {
      const ang = Math.random()*Math.PI*2;
      particles.push({
        x: player.x, y: player.y,
        vx: Math.cos(ang)*140, vy: Math.sin(ang)*140 - 90,
        life: 0.9, max: 0.9, r: 3, color: '#ffe066'
      });
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 320 * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function damagePlayer() {
    if (player.invuln > 0) return;
    if (shieldCharges > 0) {
      shieldCharges--;
      player.invuln = 1.2;
      shakeAmt = 14;
      for (let i = 0; i < 30; i++) {
        const ang = Math.random()*Math.PI*2;
        particles.push({
          x: player.x, y: player.y - 5,
          vx: Math.cos(ang)*220, vy: Math.sin(ang)*220,
          life: 0.6, max: 0.6, r: 3, color: '#66ccff'
        });
      }
      return;
    }
    lives--;
    player.invuln = 2;
    shakeAmt = 20;
    for (let i = 0; i < 30; i++) {
      const ang = Math.random()*Math.PI*2;
      particles.push({
        x: player.x, y: player.y,
        vx: Math.cos(ang)*200, vy: Math.sin(ang)*200,
        life: 0.7, max: 0.7, r: 3, color: '#ff4466'
      });
    }
    if (lives <= 0) {
      state = 'gameover';
    }
  }

  function render() {
    ctx.save();
    if (shakeAmt > 0) {
      ctx.translate((Math.random()-0.5)*shakeAmt, (Math.random()-0.5)*shakeAmt);
    }
    drawBackground();

    if (state === 'menu') {
      drawMenu();
    } else {
      drawFloor();
      drawCeiling();
      drawBubbles();
      drawPowerups();
      drawPlayer();
      drawHarpoons();
      drawParticles();
      drawHUD();
      if (state === 'levelclear') drawLevelClear();
      if (state === 'gameover') drawGameOver();
      if (state === 'win') drawWin();
      if (paused) drawPaused();
    }
    ctx.restore();
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    const hue = (level * 30) % 360;
    g.addColorStop(0, `hsl(${hue}, 60%, 12%)`);
    g.addColorStop(0.5, `hsl(${(hue+40)%360}, 50%, 20%)`);
    g.addColorStop(1, `hsl(${(hue+80)%360}, 40%, 10%)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    for (const s of stars) {
      const a = 0.4 + Math.sin(s.tw)*0.3;
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle = `hsla(${(hue+200)%360}, 30%, 8%, 0.7)`;
    ctx.beginPath();
    ctx.moveTo(0, H - 80);
    for (let x = 0; x <= W; x += 40) {
      const y = H - 80 - Math.sin(x*0.012 + level)*30 - Math.sin(x*0.03)*15;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fill();

    for (const c of clouds) {
      ctx.fillStyle = `rgba(255,255,255,${c.alpha})`;
      drawCloud(c.x, c.y, c.w);
    }
  }

  function drawCloud(x, y, w) {
    ctx.beginPath();
    ctx.arc(x, y, w*0.25, 0, Math.PI*2);
    ctx.arc(x + w*0.25, y - w*0.08, w*0.22, 0, Math.PI*2);
    ctx.arc(x + w*0.5, y, w*0.26, 0, Math.PI*2);
    ctx.arc(x + w*0.7, y + w*0.05, w*0.2, 0, Math.PI*2);
    ctx.fill();
  }

  function drawFloor() {
    const g = ctx.createLinearGradient(0, H-20, 0, H);
    g.addColorStop(0, '#444');
    g.addColorStop(1, '#111');
    ctx.fillStyle = g;
    ctx.fillRect(0, H-20, W, 20);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H-20); ctx.lineTo(W, H-20);
    ctx.stroke();
  }

  function drawCeiling() {
    // Stone bar at the top
    const baseTop = CEILING_Y - 10;
    const bg = ctx.createLinearGradient(0, baseTop, 0, CEILING_Y + 4);
    bg.addColorStop(0, '#2a2a35');
    bg.addColorStop(1, '#444455');
    ctx.fillStyle = bg;
    ctx.fillRect(0, baseTop, W, 14);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.moveTo(0, CEILING_Y + 4); ctx.lineTo(W, CEILING_Y + 4);
    ctx.stroke();

    // Spikes
    const count = Math.ceil(W / SPIKE_W);
    for (let i = 0; i < count; i++) {
      const x = i * SPIKE_W;
      const g = ctx.createLinearGradient(0, CEILING_Y, 0, CEILING_Y + SPIKE_H);
      g.addColorStop(0, '#bfc7d4');
      g.addColorStop(0.5, '#8e96a4');
      g.addColorStop(1, '#3a3f4a');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(x, CEILING_Y);
      ctx.lineTo(x + SPIKE_W, CEILING_Y);
      ctx.lineTo(x + SPIKE_W/2, CEILING_Y + SPIKE_H);
      ctx.closePath();
      ctx.fill();
      // highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 1, CEILING_Y + 1);
      ctx.lineTo(x + SPIKE_W/2, CEILING_Y + SPIKE_H - 2);
      ctx.stroke();
    }
  }

  function drawBubbles() {
    for (const b of bubbles) {
      const wobR = b.r + Math.sin(b.wobble)*1.5;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(b.x + 4, b.y + 6, wobR*0.9, wobR*0.4, 0, 0, Math.PI*2);
      ctx.fill();

      const g = ctx.createRadialGradient(b.x - wobR*0.35, b.y - wobR*0.4, wobR*0.1, b.x, b.y, wobR);
      g.addColorStop(0, b.color2);
      g.addColorStop(0.4, b.color1);
      g.addColorStop(1, shade(b.color1, -40));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x, b.y, wobR, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = shade(b.color1, -50);
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.ellipse(b.x - wobR*0.35, b.y - wobR*0.4, wobR*0.25, wobR*0.18, -0.6, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(b.x - wobR*0.15, b.y - wobR*0.55, wobR*0.06, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawHarpoons() {
    for (const h of harpoons) {
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(h.x, player.y - 10);
      ctx.lineTo(h.x, h.topY);
      ctx.stroke();
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      for (let y = h.topY; y < player.y - 10; y += 8) {
        ctx.beginPath();
        ctx.moveTo(h.x - 3, y);
        ctx.lineTo(h.x + 3, y);
        ctx.stroke();
      }
      ctx.fillStyle = '#ffeb6b';
      ctx.beginPath();
      ctx.moveTo(h.x, h.topY - 8);
      ctx.lineTo(h.x - 5, h.topY + 2);
      ctx.lineTo(h.x + 5, h.topY + 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#aa8800';
      ctx.stroke();
    }
  }

  function drawPlayer() {
    const p = player;
    const blink = p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0;
    if (blink) { ctx.save(); ctx.globalAlpha = 0.4; }

    const bob = Math.sin(p.walkPhase)*2;
    const cx = p.x, cy = p.y;

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx, H - 22, 22, 4, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#2a3a5a';
    ctx.fillRect(cx - 10, cy + 10 + bob, 7, 14 - bob);
    ctx.fillRect(cx + 3, cy + 10 - bob, 7, 14 + bob);

    const bodyG = ctx.createLinearGradient(cx - 18, cy - 10, cx + 18, cy + 15);
    bodyG.addColorStop(0, '#4a7bd6');
    bodyG.addColorStop(1, '#2848a0');
    ctx.fillStyle = bodyG;
    roundRect(cx - 16, cy - 8, 32, 22, 6);
    ctx.fill();

    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 16, cy + 10, 32, 4);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(cx - 4, cy + 10, 8, 4);

    ctx.fillStyle = '#3858b8';
    ctx.fillRect(cx - 18, cy - 4, 6, 14);
    ctx.fillRect(cx + 12, cy - 4, 6, 14);

    const headG = ctx.createRadialGradient(cx - 3, cy - 18, 2, cx, cy - 15, 12);
    headG.addColorStop(0, '#ffe0c2');
    headG.addColorStop(1, '#d9a679');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.arc(cx, cy - 15, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#3a2818';
    ctx.beginPath();
    ctx.arc(cx, cy - 19, 10, Math.PI*1.1, Math.PI*1.9);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - 4, cy - 15, 2, 2);
    ctx.fillRect(cx + 2, cy - 15, 2, 2);

    ctx.fillStyle = '#666';
    ctx.fillRect(cx - 8, cy - 12, 16, 5);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(cx - 2, cy - 15, 4, 6);

    if (blink) ctx.restore();

    // Shield bubble around player
    if (shieldCharges > 0) {
      const t = performance.now() / 1000;
      const r = 32 + Math.sin(t*5)*2;
      const sg = ctx.createRadialGradient(cx, cy - 5, r*0.4, cx, cy - 5, r);
      sg.addColorStop(0, 'rgba(102,255,204,0)');
      sg.addColorStop(0.7, 'rgba(102,255,204,0.15)');
      sg.addColorStop(1, 'rgba(102,255,204,0.55)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(cx, cy - 5, r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = `rgba(150,255,220,${0.6 + Math.sin(t*5)*0.2})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  function drawPowerups() {
    for (const p of powerups) {
      // Flash when about to disappear (last 1.5s on floor)
      const blinking = p.onFloor && p.floorTimer < 1.5;
      if (blinking && Math.floor(p.floorTimer * 8) % 2 === 0) continue;

      const bobAmt = p.onFloor ? 1.5 : 3;
      const y = p.y + Math.sin(p.bob)*bobAmt;

      let col = '#ffcc44', sym = '?';
      if (p.type === 'life')   { col = '#ff4466'; sym = '♥'; }
      if (p.type === 'slow')   { col = '#44aaff'; sym = '⧗'; }
      if (p.type === 'double') { col = '#aa66ff'; sym = '⇈'; }
      if (p.type === 'triple') { col = '#ff66cc'; sym = '⫶'; }
      if (p.type === 'freeze') { col = '#88ddff'; sym = '❄'; }
      if (p.type === 'shield') { col = '#66ffcc'; sym = '⛨'; }
      if (p.type === 'bomb')   { col = '#ff8833'; sym = '✸'; }
      if (p.type === 'magnet') { col = '#dd4444'; sym = 'U'; }

      // glow
      const gg = ctx.createRadialGradient(p.x, y, 0, p.x, y, 25);
      gg.addColorStop(0, withAlpha(col, 0.55));
      gg.addColorStop(1, withAlpha(col, 0));
      ctx.fillStyle = gg;
      ctx.fillRect(p.x - 25, y - 25, 50, 50);

      ctx.fillStyle = col;
      roundRect(p.x - 13, y - 13, 26, 26, 6);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 17px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sym, p.x, y + 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = Math.max(0, p.life / p.max);
      ctx.fillStyle = withAlpha(p.color, a);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, 40);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Segoe UI';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`SCORE  ${score}`, 16, 20);

    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level} / ${MAX_LEVEL}`, W/2, 20);

    ctx.textAlign = 'right';
    ctx.fillText('LIVES', W - 100, 20);
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 80 + i * 22, 20, 8);
    }

    const tFrac = 1 - levelTimer / maxLevelTime;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(10, 44, W - 20, 6);
    const tColor = tFrac > 0.4 ? '#5ec96b' : (tFrac > 0.2 ? '#e8c44a' : '#e85a3a');
    ctx.fillStyle = tColor;
    ctx.fillRect(10, 44, (W - 20) * Math.max(0, tFrac), 6);

    let py = 60;
    ctx.textAlign = 'left';
    ctx.font = '14px Segoe UI';
    if (slowTimer > 0)   { ctx.fillStyle = '#44aaff'; ctx.fillText(`⧗ Slow ${slowTimer.toFixed(1)}s`, 12, py); py += 18; }
    if (doubleTimer > 0) { ctx.fillStyle = '#aa66ff'; ctx.fillText(`⇈ Double ${doubleTimer.toFixed(1)}s`, 12, py); py += 18; }
    if (tripleTimer > 0) { ctx.fillStyle = '#ff66cc'; ctx.fillText(`⫶ Triple ${tripleTimer.toFixed(1)}s`, 12, py); py += 18; }
    if (freezeTimer > 0) { ctx.fillStyle = '#88ddff'; ctx.fillText(`❄ Freeze ${freezeTimer.toFixed(1)}s`, 12, py); py += 18; }
    if (magnetTimer > 0) { ctx.fillStyle = '#dd4444'; ctx.fillText(`U Magnet ${magnetTimer.toFixed(1)}s`, 12, py); py += 18; }
    if (shieldCharges > 0) { ctx.fillStyle = '#66ffcc'; ctx.fillText(`⛨ Shield x${shieldCharges}`, 12, py); py += 18; }
  }

  function drawHeart(x, y, r) {
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    ctx.moveTo(x, y + r*0.6);
    ctx.bezierCurveTo(x, y, x - r, y, x - r, y - r*0.3);
    ctx.bezierCurveTo(x - r, y - r, x, y - r, x, y - r*0.3);
    ctx.bezierCurveTo(x, y - r, x + r, y - r, x + r, y - r*0.3);
    ctx.bezierCurveTo(x + r, y, x, y, x, y + r*0.6);
    ctx.fill();
  }

  function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const t = performance.now() / 1000;
    const bx = W/2 - 180, by = H/2 - 60 + Math.sin(t*2)*8;
    const br = 60;
    const g = ctx.createRadialGradient(bx - 20, by - 25, 5, bx, by, br);
    g.addColorStop(0, '#ff99aa');
    g.addColorStop(0.4, '#ff5577');
    g.addColorStop(1, '#992244');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(bx - 20, by - 25, 15, 10, -0.5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 56px Segoe UI';
    ctx.fillText('BUBBLE TROUBLE', W/2 + 30, H/2 - 80);
    ctx.font = '24px Segoe UI';
    ctx.fillStyle = '#ffcc66';
    ctx.fillText('DELUXE', W/2 + 30, H/2 - 40);

    ctx.fillStyle = '#fff';
    ctx.font = '20px Segoe UI';
    ctx.fillText(`לחץ ENTER להתחלה`, W/2, H/2 + 40);
    ctx.font = '15px Segoe UI';
    ctx.fillStyle = '#aab';
    ctx.fillText('חצים לתזוזה  ·  רווח לירייה  ·  P להשהיה', W/2, H/2 + 75);
    ctx.fillText('פוצץ את כל הבועות בכל שלב כדי להתקדם', W/2, H/2 + 100);
    ctx.fillText(`${MAX_LEVEL} שלבים · קוצים בתקרה · 8 פאוור-אפס`, W/2, H/2 + 125);
  }

  function drawLevelClear() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#7dffa9';
    ctx.font = 'bold 56px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`Level ${level} Clear!`, W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '22px Segoe UI';
    ctx.fillText(`Score: ${score}`, W/2, H/2 + 30);
    if (level < MAX_LEVEL) {
      ctx.font = '18px Segoe UI';
      ctx.fillStyle = '#ccc';
      ctx.fillText(`לחץ ENTER לשלב הבא`, W/2, H/2 + 70);
    }
    if (levelClearTimer <= 0 && level >= MAX_LEVEL) {
      state = 'win';
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff5577';
    ctx.font = 'bold 64px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '24px Segoe UI';
    ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 30);
    ctx.font = '18px Segoe UI';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`לחץ ENTER לחזרה לתפריט`, W/2, H/2 + 70);
  }

  function drawWin() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 64px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WON!', W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '24px Segoe UI';
    ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 30);
    ctx.font = '18px Segoe UI';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`לחץ ENTER לחזרה לתפריט`, W/2, H/2 + 70);
  }

  function drawPaused() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 56px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '20px Segoe UI';
    ctx.fillText('לחץ P להמשיך', W/2, H/2 + 50);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function shade(hex, percent) {
    const c = hex.replace('#','');
    const r = parseInt(c.substr(0,2), 16);
    const g = parseInt(c.substr(2,2), 16);
    const b = parseInt(c.substr(4,2), 16);
    const f = percent < 0 ? 0 : 255;
    const t = Math.abs(percent) / 100;
    const nr = Math.round((f - r) * t + r);
    const ng = Math.round((f - g) * t + g);
    const nb = Math.round((f - b) * t + b);
    return `rgb(${nr},${ng},${nb})`;
  }

  function withAlpha(color, a) {
    if (color.startsWith('#')) {
      const c = color.replace('#','');
      const r = parseInt(c.substr(0,2), 16);
      const g = parseInt(c.substr(2,2), 16);
      const b = parseInt(c.substr(4,2), 16);
      return `rgba(${r},${g},${b},${a})`;
    }
    return color;
  }

  function startGame() {
    resetAll();
    state = 'playing';
    makeLevel(level);
  }

  function nextLevel() {
    level++;
    if (level > MAX_LEVEL) {
      state = 'win';
      return;
    }
    state = 'playing';
    makeLevel(level);
  }

  function resetAll() {
    level = 1; score = 0; lives = 3;
    slowTimer = 0; hasDouble = false; doubleTimer = 0;
    hasTriple = false; tripleTimer = 0;
    freezeTimer = 0; magnetTimer = 0; shieldCharges = 0;
    player.x = W/2; player.invuln = 0;
    bubbles = []; harpoons = []; particles = []; powerups = [];
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
