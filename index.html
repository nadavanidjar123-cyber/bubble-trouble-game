<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bubble Trouble Pro</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
        #game-container { position: relative; }
        canvas { border: 5px solid #444; background: #001122; cursor: none; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: #0f0; font-size: 20px; text-shadow: 2px 2px #000; }
        #time-bar-container { position: absolute; bottom: -25px; width: 100%; height: 15px; background: #333; border: 2px solid #555; }
        #time-bar { height: 100%; background: linear-gradient(90deg, #f00, #ff0, #0f0); width: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>שלב: <span id="lvl">1</span></div>
        <div>חיים: <span id="lives">3</span></div>
        <div>ניקוד: <span id="score">0</span></div>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="time-bar-container"><div id="time-bar"></div></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// מצב משחק
let state = {
    lvl: 1, lives: 3, score: 0, time: 100, 
    gameOver: false, paused: false,
    msg: ""
};

let player = { x: 400, y: 440, w: 30, h: 45, speed: 6, dir: 0 };
let harpoon = { x: 0, y: 500, active: false };
let bubbles = [];
let spikesY = 0; // גובה הקוצים בתקרה

function initLevel() {
    spikesY = 20;
    state.time = 100;
    harpoon.active = false;
    player.x = canvas.width / 2;
    
    // יצירת בועות לפי שלב (כאן אפשר להוסיף לוגיקה ל-50 שלבים)
    bubbles = [];
    let count = Math.min(state.lvl, 5); 
    for(let i=0; i<count; i++) {
        bubbles.push({
            x: 100 + (i * 150), y: 150,
            r: 30 + (state.lvl * 2), 
            dx: 2 + (state.lvl * 0.5), dy: 0,
            color: `hsl(${i * 70}, 80%, 60%)`
        });
    }
}

function drawPlayer(x, y) {
    // גוף
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(x - 15, y, 30, 40);
    // ראש (כובע)
    ctx.fillStyle = "#f00";
    ctx.fillRect(x - 12, y - 10, 24, 12);
    // עיניים
    ctx.fillStyle = "#000";
    ctx.fillRect(x - 8, y + 5, 4, 4);
    ctx.fillRect(x + 4, y + 5, 4, 4);
}

function drawSpikes() {
    ctx.fillStyle = "#666";
    for(let i=0; i<canvas.width; i+=20) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i+10, spikesY);
        ctx.lineTo(i+20, 0);
        ctx.fill();
    }
}

function update() {
    if (state.gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // זמן
    state.time -= 0.05;
    document.getElementById('time-bar').style.width = state.time + "%";
    if (state.time <= 0) {
        loseLife("נגמר הזמן!");
        return;
    }

    drawSpikes();

    // תנועת שחקן
    if (keys['ArrowLeft'] && player.x > 20) player.x -= player.speed;
    if (keys['ArrowRight'] && player.x < canvas.width - 20) player.x += player.speed;
    drawPlayer(player.x, player.y);

    // צלצל (שרשרת)
    if (harpoon.active) {
        harpoon.y -= 10;
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(harpoon.x, 500);
        ctx.lineTo(harpoon.x, harpoon.y);
        ctx.stroke();
        ctx.setLineDash([]);
        if (harpoon.y <= spikesY) harpoon.active = false;
    }

    // בועות
    bubbles.forEach((b, index) => {
        b.dy += 0.15; // כבידה
        b.x += b.dx; b.y += b.dy;

        if (b.x + b.r > canvas.width || b.x - b.r < 0) b.dx *= -1;
        if (b.y + b.r > canvas.height) { b.y = canvas.height - b.r; b.dy = -8; }
        if (b.y - b.r < spikesY) b.dy = 2;

        // ציור בועה
        let grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, '#fff'); grad.addColorStop(1, b.color);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();

        // התנגשות צלצל
        if (harpoon.active && Math.abs(harpoon.x - b.x) < b.r && harpoon.y < b.y + b.r) {
            harpoon.active = false;
            state.score += 50;
            if (b.r > 15) {
                bubbles.push({ ...b, r: b.r/2, dx: -2, dy: -5 });
                bubbles.push({ ...b, r: b.r/2, dx: 2, dy: -5 });
            }
            bubbles.splice(index, 1);
        }

        // התנגשות שחקן
        if (Math.abs(player.x - b.x) < b.r + 10 && Math.abs(player.y - b.y) < b.r + 20) {
            loseLife("נפגעת!");
        }
    });

    if (bubbles.length === 0) {
        state.lvl++;
        document.getElementById('lvl').innerText = state.lvl;
        initLevel();
    }

    document.getElementById('score').innerText = state.score;
    requestAnimationFrame(update);
}

function loseLife(msg) {
    state.lives--;
    document.getElementById('lives').innerText = state.lives;
    if (state.lives <= 0) {
        state.gameOver = true;
        alert("Game Over! סופי. ניקוד: " + state.score);
        location.reload();
    } else {
        alert(msg + " נשארו לך " + state.lives + " חיים.");
        initLevel();
    }
}

let keys = {};
window.onkeydown = (e) => { 
    keys[e.key] = true; 
    if (e.key === ' ' && !harpoon.active) { harpoon.active = true; harpoon.x = player.x; harpoon.y = 450; }
};
window.onkeyup = (e) => keys[e.key] = false;

initLevel();
update();
</script>
</body>
</html>
