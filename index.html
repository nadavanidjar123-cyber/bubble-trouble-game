<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Professional Bubble Trouble Engine</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #333; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        // --- Game Core Classes ---
        
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.isRunning = true;
                
                this.player = new Player(this);
                this.bubbles = [new Bubble(100, 100, 40, 2, 2, this)];
                this.harpoons = [];
                this.particles = [];
                
                this.input = new InputHandler();
                this.requestLoop = this.requestLoop.bind(this);
            }

            requestLoop() {
                if(!this.isRunning) return;
                this.update();
                this.draw();
                requestAnimationFrame(this.requestLoop);
            }

            update() {
                this.player.update(this.input);
                this.harpoons.forEach(h => h.update());
                this.bubbles.forEach(b => b.update());
                this.particles.forEach(p => p.update());
                
                // Collision Detection
                this.checkCollisions();
            }

            checkCollisions() {
                // Harpoon vs Bubble
                this.harpoons.forEach((h, hIdx) => {
                    this.bubbles.forEach((b, bIdx) => {
                        if(b.checkHit(h)) {
                            this.score += 50;
                            h.active = false;
                            b.split();
                            this.bubbles.splice(bIdx, 1);
                        }
                    });
                });
            }

            draw() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                this.player.draw(this.ctx);
                this.harpoons.forEach(h => h.draw(this.ctx));
                this.bubbles.forEach(b => b.draw(this.ctx));
                
                // UI
                this.ctx.fillStyle = "white";
                this.ctx.font = "20px Arial";
                this.ctx.fillText(`Score: ${this.score} | Level: ${this.level} | Lives: ${this.lives}`, 20, 30);
            }
        }

        class InputHandler {
            constructor() {
                this.keys = {};
                window.addEventListener('keydown', e => this.keys[e.code] = true);
                window.addEventListener('keyup', e => this.keys[e.code] = false);
            }
        }

        class Player {
            constructor(game) {
                this.game = game;
                this.x = 400; this.y = 550;
                this.width = 40; this.height = 40;
                this.speed = 8;
            }
            update(input) {
                if(input.keys['ArrowLeft'] && this.x > 0) this.x -= this.speed;
                if(input.keys['ArrowRight'] && this.x < this.game.width - this.width) this.x += this.speed;
                if(input.keys['Space'] && this.game.harpoons.length === 0) {
                    this.game.harpoons.push(new Harpoon(this.x + 20, this.y, this.game));
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        class Bubble {
            constructor(x, y, radius, dx, dy, game) {
                this.x = x; this.y = y; this.radius = radius;
                this.dx = dx; this.dy = dy; this.game = game;
                this.gravity = 0.2;
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.dy += this.gravity;
                if(this.x + this.radius > this.game.width || this.x - this.radius < 0) this.dx *= -1;
                if(this.y + this.radius > this.game.height) this.dy = -10;
            }
            checkHit(harpoon) {
                return Math.hypot(this.x - harpoon.x, this.y - harpoon.y) < this.radius;
            }
            split() {
                if(this.radius > 15) {
                    this.game.bubbles.push(new Bubble(this.x, this.y, this.radius/2, 3, -5, this.game));
                    this.game.bubbles.push(new Bubble(this.x, this.y, this.radius/2, -3, -5, this.game));
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Harpoon {
            constructor(x, y, game) {
                this.x = x; this.y = y; this.active = true; this.game = game;
            }
            update() {
                this.y -= 10;
                if(this.y < 0) this.active = false;
            }
            draw(ctx) {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.x, this.game.height);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        // Initialize Engine
        const game = new GameEngine();
        game.requestLoop();
    </script>
</body>
</html>
