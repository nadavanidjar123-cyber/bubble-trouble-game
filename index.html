<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bubble Trouble Pro</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #game-container { position: relative; border: 6px solid #333; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: #fff; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>שלב: <span id="lvl">1</span></div>
        <div>חיים: <span id="lives">3</span></div>
        <div>ניקוד: <span id="score">0</span></div>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let state = { lvl: 1, lives: 3, score: 0, gameOver: false };
let player = { x: 400, y: 450, w: 25, h: 35, speed: 7 };
let harpoons = [];
let bubbles = [];
let spikesY = 30; // גובה הקוצים

function initLevel() {
    bubbles = [];
    harpoons = [];
    player.x = 400;
    
    // יצירת בועות עם מהירות מבוקרת
    let count = Math.min(state.lvl + 1, 6);
    for(let i=0; i<count; i++) {
        bubbles.push({
            x: 100 + (i * 100), y: 100,
            r: 30, dx: (Math.random() > 0.5 ? 2 : -2), dy: 0,
            hue: Math.random() * 360
        });
    }
}

function update() {
    if (state.gameOver) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ציור קוצים
    ctx.fillStyle = "#ff4444";
    for(let i=0; i<canvas.width; i+=20) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+10, spikesY); ctx.lineTo(i+20, 0); ctx.fill();
    }

    // שחקן
    if (keys['ArrowLeft'] && player.x > player.w) player.x -= player.speed;
    if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
    
    // ציור שחקן
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(player.x - player.w/2, player.y, player.w, player.h);
    
    // בדיקת קוצים (מוות)
    if (player.y < spikesY + 10) resetPlayer();

    // צלצלים
    for (let i = harpoons.length - 1; i >= 0; i--) {
        let h = harpoons[i]; h.y -= 10;
        ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(h.x, canvas.height); ctx.lineTo(h.x, h.y); ctx.stroke();
        if (h.y <= spikesY) harpoons.splice(i, 1);
    }

    // בועות
    for (let i = bubbles.length - 1; i >= 0; i--) {
        let b = bubbles[i];
        b.dy += 0.15; // כבידה נמוכה יותר
        b.x += b.dx; b.y += b.dy;

        // התנגשות קירות ורצפה
        if (b.x + b.r > canvas.width || b.x - b.r < 0) b.dx *= -1;
        if (b.y + b.r > canvas.height) { b.y = canvas.height - b.r; b.dy = -8; } // קפיצה מבוקרת
        if (b.y - b.r < spikesY) b.dy = 2;

        // ציור בועה
        ctx.fillStyle = `hsl(${b.hue}, 70%, 50%)`;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();

        // התנגשות שחקן
        if (Math.abs(player.x - b.x) < b.r + 10 && Math.abs(player.y + player.h/2 - b.y) < b.r + 10) {
            resetPlayer();
        }

        // התנגשות צלצל
        for (let j = harpoons.length - 1; j >= 0; j--) {
            let h = harpoons[j];
            if (Math.abs(h.x - b.x) < b.r && h.y < b.y + b.r) {
                harpoons.splice(j, 1);
                state.score += 100;
                if (b.r > 15) {
                    bubbles.push({x: b.x, y: b.y, r: b.r*0.6, dx: -2, dy: -4, hue: b.hue});
                    bubbles.push({x: b.x, y: b.y, r: b.r*0.6, dx: 2, dy: -4, hue: b.hue});
                }
                bubbles.splice(i, 1);
            }
        }
    }

    if (bubbles.length === 0) { state.lvl++; initLevel(); }
    document.getElementById('score').innerText = state.score;
    requestAnimationFrame(update);
}

function resetPlayer() {
    state.lives--;
    document.getElementById('lives').innerText = state.lives;
    if (state.lives <= 0) { alert("Game Over! נקודות: " + state.score); location.reload(); }
    player.x = 400; // מחזיר לאמצע בלי לעצור את המשחק
}

let keys = {};
window.onkeydown = (e) => { keys[e.key] = true; if(e.key === ' ') harpoons.push({x: player.x, y: player.y}); };
window.onkeyup = (e) => keys[e.key] = false;

initLevel();
update();
</script>
</body>
</html>
